<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZH to KH Translator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#ffffff;
    --surface:#f8f8f8;
    --border:#e8e8e8;
    --border-hover:#d0d0d0;
    --text:#111111;
    --text-secondary:#666666;
    --text-muted:#aaaaaa;
    --accent:#2563eb;
    --accent-light:#eff6ff;
    --accent-hover:#1d4ed8;
    --green:#16a34a;
    --green-light:#f0fdf4;
    --red:#dc2626;
    --red-light:#fef2f2;
    --amber:#d97706;
    --amber-light:#fffbeb;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --shadow-md:0 4px 12px rgba(0,0,0,.08);
    --shadow-lg:0 8px 24px rgba(0,0,0,.1);
    --radius:10px;
    --radius-sm:6px;
  }
  html{font-size:14px}
  body{
    font-family:'DM Sans',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* HEADER */
  header{
    border-bottom:1px solid var(--border);
    padding:18px 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    background:rgba(255,255,255,.95);
    backdrop-filter:blur(10px);
    z-index:100;
  }
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{
    width:32px;height:32px;
    background:var(--accent);
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
  }
  .logo-icon svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}
  .logo-text{font-weight:600;font-size:1rem;letter-spacing:-.02em;color:var(--text)}
  .logo-sub{font-size:.75rem;color:var(--text-muted);font-weight:400;margin-left:2px}
  .header-stats{
    font-size:.75rem;
    color:var(--text-muted);
    font-family:'DM Mono',monospace;
    display:flex;gap:16px;
  }
  .stat-item{display:flex;align-items:center;gap:5px}
  .stat-dot{width:6px;height:6px;border-radius:50%}
  .stat-dot.green{background:var(--green)}
  .stat-dot.amber{background:var(--amber)}
  .stat-dot.blue{background:var(--accent)}

  /* MAIN */
  main{flex:1;padding:28px 32px;max-width:1300px;margin:0 auto;width:100%}

  /* INPUT PANEL */
  .input-panel{
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:var(--bg);
    overflow:hidden;
    box-shadow:var(--shadow);
    margin-bottom:20px;
  }
  .panel-header{
    padding:12px 16px;
    border-bottom:1px solid var(--border);
    background:var(--surface);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .panel-label{
    font-size:.7rem;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--text-muted);
    display:flex;align-items:center;gap:6px;
  }
  .panel-label svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
  .panel-actions{display:flex;gap:6px;align-items:center}

  textarea{
    width:100%;
    border:none;
    outline:none;
    resize:none;
    font-family:'DM Mono',monospace;
    font-size:.82rem;
    line-height:1.7;
    padding:16px;
    background:var(--bg);
    color:var(--text);
    min-height:130px;
  }
  textarea::placeholder{color:var(--text-muted)}

  /* PARSE PREVIEW */
  #parsePreview{
    border-top:1px solid var(--border);
    padding:12px 16px;
    background:var(--surface);
    display:none;
  }
  .parse-title{
    font-size:.68rem;
    font-weight:600;
    letter-spacing:.07em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin-bottom:8px;
    display:flex;align-items:center;gap:6px;
  }
  .parse-chips{display:flex;flex-wrap:wrap;gap:5px}
  .parse-chip{
    font-family:'DM Mono',monospace;
    font-size:.72rem;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:20px;
    padding:3px 10px;
    color:var(--text-secondary);
    white-space:nowrap;
    max-width:260px;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .parse-chip span.ts{color:var(--accent);font-weight:500;margin-right:4px}
  .parse-more{
    font-size:.72rem;
    color:var(--text-muted);
    padding:3px 8px;
    font-family:'DM Mono',monospace;
  }

  /* TOOLBAR */
  .toolbar{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:20px;
    flex-wrap:wrap;
  }
  .btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:9px 18px;
    border-radius:var(--radius-sm);
    font-family:'DM Sans',sans-serif;
    font-size:.82rem;
    font-weight:500;
    cursor:pointer;
    border:none;
    transition:all .15s;
    white-space:nowrap;
  }
  .btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover:not(:disabled){background:var(--accent-hover)}
  .btn-primary:disabled{opacity:.45;cursor:not-allowed}
  .btn-outline{background:var(--bg);color:var(--text-secondary);border:1px solid var(--border)}
  .btn-outline:hover{border-color:var(--border-hover);color:var(--text);background:var(--surface)}
  .btn-ghost{background:transparent;color:var(--text-muted);padding:9px 12px}
  .btn-ghost:hover{background:var(--surface);color:var(--text)}
  .btn-danger{background:var(--red-light);color:var(--red);border:1px solid #fecaca}
  .btn-danger:hover{background:#fee2e2}
  .btn-success{background:var(--green-light);color:var(--green);border:1px solid #bbf7d0}
  .btn-success:hover{background:#dcfce7}

  .toolbar-sep{width:1px;height:24px;background:var(--border);margin:0 4px}

  /* PROGRESS */
  #progressWrap{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:20px;
    display:none;
  }
  .progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .progress-label{font-size:.78rem;color:var(--text-secondary);font-weight:500}
  .progress-count{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--text-muted)}
  .progress-bar-wrap{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
  .progress-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s ease;width:0%}

  /* RESULTS TABLE */
  #resultWrap{display:none}
  .result-header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:12px;
    flex-wrap:wrap;gap:8px;
  }
  .result-title{
    font-size:.8rem;
    font-weight:600;
    color:var(--text-secondary);
    letter-spacing:.03em;
    display:flex;align-items:center;gap:8px;
  }
  .result-badge{
    background:var(--accent-light);
    color:var(--accent);
    font-size:.68rem;
    font-weight:600;
    letter-spacing:.04em;
    padding:2px 8px;
    border-radius:20px;
    font-family:'DM Mono',monospace;
  }
  .result-copy-actions{display:flex;gap:6px;flex-wrap:wrap}

  .table-wrap{
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  .table-head{
    display:grid;
    grid-template-columns:72px 1fr 1fr 52px;
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:10px 16px;
    gap:12px;
  }
  .th{
    font-size:.67rem;
    font-weight:600;
    letter-spacing:.09em;
    text-transform:uppercase;
    color:var(--text-muted);
  }
  .th.center{text-align:center}

  #linesContainer{}
  .line-row{
    display:grid;
    grid-template-columns:72px 1fr 1fr 52px;
    padding:12px 16px;
    gap:12px;
    border-bottom:1px solid var(--border);
    align-items:start;
    transition:background .1s;
  }
  .line-row:last-child{border-bottom:none}
  .line-row:hover{background:var(--surface)}
  .line-row.editing{background:var(--accent-light)}
  .line-row.error-row .khmer-cell{color:var(--amber)}

  .ts-cell{
    font-family:'DM Mono',monospace;
    font-size:.72rem;
    font-weight:500;
    color:var(--accent);
    padding-top:2px;
    white-space:nowrap;
  }
  .zh-cell{
    font-size:.85rem;
    line-height:1.6;
    color:var(--text);
    word-break:break-all;
  }
  .khmer-cell{
    font-size:.85rem;
    line-height:1.6;
    color:var(--text);
    word-break:break-word;
  }
  .khmer-cell.pending{color:var(--text-muted);font-style:italic;font-size:.78rem}
  .khmer-cell.translating{color:var(--amber);font-style:italic;font-size:.78rem}

  /* EDIT */
  .khmer-edit-input{
    width:100%;
    border:1px solid var(--accent);
    border-radius:4px;
    padding:5px 8px;
    font-size:.85rem;
    line-height:1.6;
    font-family:'DM Sans',sans-serif;
    outline:none;
    background:white;
    color:var(--text);
    resize:vertical;
    min-height:38px;
    box-shadow:0 0 0 3px rgba(37,99,235,.1);
  }
  .action-cell{display:flex;flex-direction:column;gap:4px;align-items:center}
  .icon-btn{
    width:28px;height:28px;
    display:flex;align-items:center;justify-content:center;
    border-radius:5px;
    cursor:pointer;
    border:none;
    background:transparent;
    color:var(--text-muted);
    transition:all .12s;
    flex-shrink:0;
  }
  .icon-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
  .icon-btn:hover{background:var(--surface);color:var(--text)}
  .icon-btn.save-btn:hover{background:var(--green-light);color:var(--green)}
  .icon-btn.cancel-btn:hover{background:var(--red-light);color:var(--red)}
  .icon-btn.edit-btn:hover{background:var(--accent-light);color:var(--accent)}

  /* TOAST */
  #toast{
    position:fixed;bottom:24px;right:24px;
    background:#111;
    color:#fff;
    padding:10px 18px;
    border-radius:8px;
    font-size:.78rem;
    font-weight:500;
    opacity:0;
    transform:translateY(8px);
    transition:all .2s;
    pointer-events:none;
    z-index:999;
    box-shadow:var(--shadow-lg);
  }
  #toast.show{opacity:1;transform:translateY(0)}

  /* EMPTY STATE */
  .empty-state{
    text-align:center;
    padding:60px 32px;
    color:var(--text-muted);
  }
  .empty-icon{
    width:48px;height:48px;
    border:1.5px dashed var(--border);
    border-radius:12px;
    margin:0 auto 16px;
    display:flex;align-items:center;justify-content:center;
  }
  .empty-icon svg{width:22px;height:22px;stroke:var(--border);fill:none;stroke-width:1.5;stroke-linecap:round}
  .empty-title{font-size:.9rem;font-weight:500;color:var(--text-secondary);margin-bottom:6px}
  .empty-desc{font-size:.78rem;line-height:1.6;max-width:300px;margin:0 auto}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:var(--border-hover)}

  @media(max-width:700px){
    header{padding:14px 16px}
    main{padding:16px}
    .table-head,.line-row{grid-template-columns:60px 1fr}
    .th:nth-child(3),.th:nth-child(4),.action-cell{display:none}
    .zh-cell,.khmer-cell{display:block}
    .line-row{display:block}
    .ts-cell{display:inline;margin-right:6px;font-size:.68rem}
    .zh-cell{display:inline;margin-right:4px}
    .khmer-cell{display:block;margin-top:4px;padding-left:0;border-left:2px solid var(--border);padding-left:8px}
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M5 8l4 4-4 4M13 12h6"/></svg>
    </div>
    <div>
      <div class="logo-text">AI SHORT DRAMA <span class="logo-sub"> Translation Tool</span> </div>
    </div>
  </div>
  <div class="header-stats" id="headerStats" style="display:none">
    <div class="stat-item"><div class="stat-dot blue"></div><span id="statTotal">0 lines</span></div>
    <div class="stat-item"><div class="stat-dot green"></div><span id="statDone">0 done</span></div>
    <div class="stat-item"><div class="stat-dot amber"></div><span id="statPending">0 pending</span></div>
  </div>
</header>

<main>
  <!-- INPUT PANEL -->
  <div class="input-panel">
    <div class="panel-header">
      <div class="panel-label">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></svg>
        Paste Subtitle Text
      </div>
      <div class="panel-actions">
        <button class="btn btn-ghost" id="clearInputBtn" style="font-size:.75rem;padding:5px 10px" onclick="clearInput()">Clear</button>
      </div>
    </div>
    <textarea id="inputText" placeholder="Paste your subtitle text here..." rows="5" oninput="handleInput()"></textarea>
    <div id="parsePreview">
      <div class="parse-title">
        <svg viewBox="0 0 24 24" width="11" height="11" style="stroke:var(--text-muted);fill:none;stroke-width:2;stroke-linecap:round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Detected Lines
      </div>
      <div class="parse-chips" id="parseChips"></div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="btn btn-primary" id="translateBtn" onclick="startTranslation()" disabled>
      <svg viewBox="0 0 24 24"><path d="M5 8l4 4-4 4M13 12h6"/></svg>
      Translate All
    </button>
    <div class="toolbar-sep"></div>
    <button class="btn btn-outline" onclick="copyKhmerOnly()" id="copyKhBtn" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M8 4v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7.2L14.8 2H10a2 2 0 0 0-2 2z"/><path d="M14 2v5h5M4 8H2v12a2 2 0 0 0 2 2h10"/></svg>
      Copy Khmer
    </button>
    <button class="btn btn-outline" onclick="copyBilingual()" id="copyBiBtn" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
      Copy Bilingual
    </button>
    <button class="btn btn-danger" onclick="clearAll()" id="clearAllBtn" style="display:none">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6M10 11v6M14 11v6"/></svg>
      Clear All
    </button>
  </div>

  <!-- PROGRESS -->
  <div id="progressWrap">
    <div class="progress-top">
      <div class="progress-label" id="progressLabel">Translating...</div>
      <div class="progress-count" id="progressCount">0 / 0</div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
  </div>

  <!-- RESULTS -->
  <div id="resultWrap">
    <div class="result-header">
      <div class="result-title">
        Translation Results
        <span class="result-badge" id="lineCountBadge">0 lines</span>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-head">
        <div class="th">Time</div>
        <div class="th">Chinese</div>
        <div class="th">Khmer</div>
        <div class="th center">Edit</div>
      </div>
      <div id="linesContainer">
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <div class="empty-title">No lines yet</div>
          <div class="empty-desc">Paste your subtitle text above and click Translate All to begin.</div>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
  let parsedLines = [];
  let translatedData = [];
  let isTranslating = false;

  // --- PARSE INPUT ---
  function parseSubtitleText(raw) {
    // Split on timestamp pattern (\d+:\d+) — handles inline pasted format
    // Match all occurrences of (M:SS) or (MM:SS) followed by text
    const pattern = /\((\d{1,2}:\d{2})\)\s*([\s\S]*?)(?=\(\d{1,2}:\d{2}\)|$)/g;
    const results = [];
    let match;
    while ((match = pattern.exec(raw)) !== null) {
      const ts = match[1].trim();
      const text = match[2].trim();
      if (ts && text) {
        results.push({ ts, zh: text, km: '', status: 'pending' });
      }
    }
    return results;
  }

  function handleInput() {
    const raw = document.getElementById('inputText').value.trim();
    const preview = document.getElementById('parsePreview');
    const chips = document.getElementById('parseChips');
    const btn = document.getElementById('translateBtn');

    if (!raw) {
      preview.style.display = 'none';
      parsedLines = [];
      btn.disabled = true;
      return;
    }

    parsedLines = parseSubtitleText(raw);

    if (parsedLines.length === 0) {
      preview.style.display = 'none';
      btn.disabled = true;
      return;
    }

    // Show preview chips
    preview.style.display = 'block';
    chips.innerHTML = '';
    const showMax = 8;
    parsedLines.slice(0, showMax).forEach(l => {
      const c = document.createElement('div');
      c.className = 'parse-chip';
      c.innerHTML = `<span class="ts">(${l.ts})</span>${escHtml(l.zh)}`;
      chips.appendChild(c);
    });
    if (parsedLines.length > showMax) {
      const more = document.createElement('div');
      more.className = 'parse-more';
      more.textContent = `+${parsedLines.length - showMax} more`;
      chips.appendChild(more);
    }

    btn.disabled = false;
  }

  function clearInput() {
    document.getElementById('inputText').value = '';
    document.getElementById('parsePreview').style.display = 'none';
    parsedLines = [];
    document.getElementById('translateBtn').disabled = true;
  }

  // --- TRANSLATION ---
  async function translateZhToKm(text) {
    // Try MyMemory API
    try {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=zh-CN|km`;
      const r = await fetch(url);
      const d = await r.json();
      if (d.responseStatus === 200 && d.responseData && d.responseData.translatedText) {
        const t = d.responseData.translatedText;
        if (t && t !== text && !/MYMEMORY WARNING/i.test(t)) return t;
      }
    } catch(e) {}
    // Fallback: LibreTranslate public
    try {
      const r = await fetch('https://libretranslate.com/translate', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({q: text, source:'zh', target:'km', format:'text'})
      });
      const d = await r.json();
      if (d.translatedText) return d.translatedText;
    } catch(e) {}
    return '[Translation unavailable]';
  }

  function sleep(ms){ return new Promise(r=>setTimeout(r,ms)) }

  async function startTranslation() {
    if (isTranslating || parsedLines.length === 0) return;
    isTranslating = true;

    // Init translated data
    translatedData = parsedLines.map(l => ({...l, km:'', status:'pending'}));

    // Show results table
    document.getElementById('resultWrap').style.display = 'block';
    document.getElementById('headerStats').style.display = 'flex';
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('translateBtn').disabled = true;
    document.getElementById('copyKhBtn').style.display = 'none';
    document.getElementById('copyBiBtn').style.display = 'none';
    document.getElementById('clearAllBtn').style.display = 'none';

    renderTable();
    updateHeaderStats();

    const total = translatedData.length;
    document.getElementById('lineCountBadge').textContent = `${total} lines`;

    for (let i = 0; i < total; i++) {
      translatedData[i].status = 'translating';
      renderRow(i);
      updateProgress(i, total, `Translating line ${i+1} of ${total}...`);

      const km = await translateZhToKm(translatedData[i].zh);
      translatedData[i].km = km;
      translatedData[i].status = km.includes('[Translation') ? 'error' : 'done';
      renderRow(i);
      updateHeaderStats();

      if (i < total - 1) await sleep(350);
    }

    isTranslating = false;
    updateProgress(total, total, 'Translation complete');
    document.getElementById('progressFill').style.background = 'var(--green)';
    document.getElementById('progressLabel').style.color = 'var(--green)';
    document.getElementById('translateBtn').disabled = false;
    document.getElementById('copyKhBtn').style.display = 'inline-flex';
    document.getElementById('copyBiBtn').style.display = 'inline-flex';
    document.getElementById('clearAllBtn').style.display = 'inline-flex';
    showToast('Translation complete — ' + total + ' lines');
  }

  function updateProgress(done, total, label) {
    document.getElementById('progressLabel').textContent = label;
    document.getElementById('progressCount').textContent = `${done} / ${total}`;
    document.getElementById('progressFill').style.width = `${total ? (done/total*100) : 0}%`;
  }

  function updateHeaderStats() {
    const total = translatedData.length;
    const done = translatedData.filter(l=>l.status==='done'||l.status==='error').length;
    const pending = total - done;
    document.getElementById('statTotal').textContent = total + ' lines';
    document.getElementById('statDone').textContent = done + ' done';
    document.getElementById('statPending').textContent = pending + ' pending';
  }

  // --- RENDER TABLE ---
  function renderTable() {
    const c = document.getElementById('linesContainer');
    c.innerHTML = '';
    translatedData.forEach((_, i) => {
      const row = createRowEl(i);
      c.appendChild(row);
    });
  }

  function createRowEl(i) {
    const row = document.createElement('div');
    row.className = 'line-row';
    row.id = `row-${i}`;
    row.innerHTML = buildRowHTML(i);
    return row;
  }

  function buildRowHTML(i) {
    const l = translatedData[i];
    let kmContent = '';
    if (l.status === 'pending') {
      kmContent = `<div class="khmer-cell pending">Waiting...</div>`;
    } else if (l.status === 'translating') {
      kmContent = `<div class="khmer-cell translating">Translating...</div>`;
    } else {
      kmContent = `<div class="khmer-cell" id="km-text-${i}">${escHtml(l.km)}</div>`;
    }

    const actions = (l.status === 'done' || l.status === 'error')
      ? `<div class="action-cell">
          <button class="icon-btn edit-btn" onclick="startEdit(${i})" title="Edit translation">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>`
      : `<div class="action-cell"></div>`;

    return `
      <div class="ts-cell">(${escHtml(l.ts)})</div>
      <div class="zh-cell">${escHtml(l.zh)}</div>
      ${kmContent}
      ${actions}
    `;
  }

  function renderRow(i) {
    const row = document.getElementById(`row-${i}`);
    if (!row) {
      const c = document.getElementById('linesContainer');
      // If table was reset, append
      if (c.querySelector('.empty-state')) c.innerHTML = '';
      const newRow = createRowEl(i);
      c.appendChild(newRow);
    } else {
      row.innerHTML = buildRowHTML(i);
      if (translatedData[i].status === 'error') row.classList.add('error-row');
      else row.classList.remove('error-row');
    }
  }

  // --- EDIT ---
  function startEdit(i) {
    const row = document.getElementById(`row-${i}`);
    row.classList.add('editing');
    const l = translatedData[i];
    row.innerHTML = `
      <div class="ts-cell">(${escHtml(l.ts)})</div>
      <div class="zh-cell">${escHtml(l.zh)}</div>
      <div>
        <textarea class="khmer-edit-input" id="edit-input-${i}" rows="2">${escHtml(l.km)}</textarea>
      </div>
      <div class="action-cell">
        <button class="icon-btn save-btn" onclick="saveEdit(${i})" title="Save">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <button class="icon-btn cancel-btn" onclick="cancelEdit(${i})" title="Cancel">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    `;
    const inp = document.getElementById(`edit-input-${i}`);
    inp.focus();
    inp.setSelectionRange(inp.value.length, inp.value.length);
    // Save on Ctrl+Enter
    inp.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') saveEdit(i);
      if (e.key === 'Escape') cancelEdit(i);
    });
  }

  function saveEdit(i) {
    const inp = document.getElementById(`edit-input-${i}`);
    if (!inp) return;
    const newVal = inp.value.trim();
    translatedData[i].km = newVal;
    translatedData[i].status = newVal ? 'done' : 'error';
    renderRow(i);
    showToast('Saved');
  }

  function cancelEdit(i) {
    renderRow(i);
  }

  // --- COPY ---
  function copyKhmerOnly() {
    const done = translatedData.filter(l=>l.km);
    if (!done.length) { showToast('No translations yet'); return; }
    const text = done.map(l=>`(${l.ts}) ${l.km}`).join('\n');
    navigator.clipboard.writeText(text).then(()=>showToast('Khmer subtitles copied'));
  }

  function copyBilingual() {
    const done = translatedData.filter(l=>l.km);
    if (!done.length) { showToast('No translations yet'); return; }
    const text = done.map(l=>`(${l.ts}) ${l.zh}\n(${l.ts}) ${l.km}`).join('\n\n');
    navigator.clipboard.writeText(text).then(()=>showToast('Bilingual script copied'));
  }

  function clearAll() {
    if (isTranslating) { showToast('Please wait for translation to finish'); return; }
    translatedData = [];
    parsedLines = [];
    document.getElementById('inputText').value = '';
    document.getElementById('parsePreview').style.display = 'none';
    document.getElementById('resultWrap').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('headerStats').style.display = 'none';
    document.getElementById('translateBtn').disabled = true;
    document.getElementById('copyKhBtn').style.display = 'none';
    document.getElementById('copyBiBtn').style.display = 'none';
    document.getElementById('clearAllBtn').style.display = 'none';
    document.getElementById('linesContainer').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
        <div class="empty-title">No lines yet</div>
        <div class="empty-desc">Paste your subtitle text above and click Translate All to begin.</div>
      </div>`;
  }

  // --- UTILS ---
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
